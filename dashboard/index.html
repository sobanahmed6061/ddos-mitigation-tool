<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DDoS Mitigation Tool — Live Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
    .header{background:linear-gradient(135deg,#161b22 0%,#21262d 100%);border-bottom:1px solid #30363d;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;color:#58a6ff;letter-spacing:.5px}
    .header-right{display:flex;align-items:center;gap:16px;font-size:12px;color:#8b949e}
    .status-dot{width:8px;height:8px;border-radius:50%;animation:blink 2s infinite}
    .dot-online{background:#3fb950}.dot-offline{background:#f85149}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:20px 28px 0}
    .grid-2{display:grid;grid-template-columns:2fr 1fr;gap:16px;padding:16px 28px 0}
    .grid-equal{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px 28px 0}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:16px 28px 0}
    .pad{padding:16px 28px 0}
    .pb{padding-bottom:28px}
    .card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:18px}
    .card-attack{background:#1a0a0a;border:1px solid #f85149;border-radius:12px;padding:18px}
    .card-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#8b949e;margin-bottom:14px;display:flex;align-items:center;gap:6px}
    .stat-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#6e7681;margin-bottom:6px}
    .stat-val{font-size:36px;font-weight:700}
    .stat-sub{font-size:12px;color:#6e7681;margin-top:4px}
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
    .badge-CRITICAL{background:#3d0a0a;color:#f85149}
    .badge-HIGH{background:#3d1f0a;color:#f0883e}
    .badge-MEDIUM{background:#3d2e0a;color:#e3b341}
    .badge-LOW{background:#0a2a0a;color:#3fb950}
    .badge-INFO{background:#0a1a3d;color:#58a6ff}
    .badge-LAB{background:#21262d;color:#8b949e}
    .metric-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #21262d;font-size:13px}
    .metric-row:last-child{border-bottom:none}
    .metric-label{color:#8b949e}
    .metric-val{font-weight:600;color:#58a6ff}
    .bar-wrap{background:#21262d;border-radius:4px;height:6px;flex:1;overflow:hidden;margin:0 8px}
    .bar-fill{height:100%;border-radius:4px;transition:width .5s}
    .alert-table{width:100%;border-collapse:collapse;font-size:12px}
    .alert-table th{text-align:left;padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#6e7681;border-bottom:1px solid #30363d;white-space:nowrap}
    .alert-table td{padding:10px;border-bottom:1px solid #161b22;vertical-align:middle}
    .alert-table tr:hover td{background:#1c2128}
    .ip-mono{font-family:'Courier New',monospace;color:#f85149;font-weight:600}
    .attack-chip{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:#1a1a2e;color:#f0883e;border:1px solid #f0883e22}
    .country-flag{font-size:14px}
    .empty{text-align:center;color:#4d5566;padding:40px;font-size:13px}
    .breakdown{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
    .bp{background:#1c2128;border-radius:3px;padding:1px 6px;font-size:10px;color:#8b949e}
    .bp span{font-weight:700}
    .active-ip{font-size:16px;font-weight:700;color:#f85149;font-family:monospace}
    .active-detail{font-size:12px;color:#8b949e;margin-top:4px}
    .active-drops{font-size:12px;color:#f85149;font-weight:600;margin-top:4px}
    .section-divider{padding:16px 28px 4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#6e7681;display:flex;align-items:center;gap:8px}
    .section-divider::after{content:'';flex:1;height:1px;background:#21262d}
    .footer{text-align:right;padding:12px 28px;font-size:10px;color:#4d5566}
    canvas{max-height:200px}
    .no-attack-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:120px;gap:8px;color:#3fb950}
    .no-attack-icon{font-size:32px}
    .no-attack-text{font-size:13px;font-weight:600}
    .pps-high{color:#f85149!important}
    .pps-med{color:#e3b341!important}
    .pps-low{color:#3fb950!important}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const API_PORT = 10000;
const API_BASE = `http://${window.location.hostname}:${API_PORT}/api/v1`;
const REFRESH  = 3000;

async function api(path) {
  try {
    const r = await fetch(`${API_BASE}${path}`);
    return r.ok ? r.json() : null;
  } catch { return null; }
}

function fmt(n) {
  if (!n && n !== 0) return '—';
  if (n >= 1e6) return `${(n/1e6).toFixed(1)}M`;
  if (n >= 1e3) return `${(n/1e3).toFixed(1)}K`;
  return String(Math.round(n));
}

function scoreColor(s) {
  return s >= 85 ? '#f85149' : s >= 70 ? '#f0883e' : s >= 55 ? '#e3b341' : s >= 40 ? '#d29922' : '#3fb950';
}

function ScoreBar({ score }) {
  const c = scoreColor(score);
  return (
    <div style={{display:'flex',alignItems:'center',gap:6}}>
      <div className="bar-wrap" style={{margin:0}}>
        <div className="bar-fill" style={{width:`${score}%`,background:c}}/>
      </div>
      <span style={{fontSize:12,color:c,minWidth:28,fontWeight:700}}>{score}</span>
    </div>
  );
}

function Breakdown({ bd }) {
  if (!bd) return null;
  return (
    <div className="breakdown">
      {[['ML',bd.ml_anomaly,25],['Type',bd.attack_type,20],['PPS',bd.packet_rate,20],['Intel',bd.threat_intel,20],['Dur',bd.duration,15]].map(([k,v,m])=>(
        <div className="bp" key={k}>{k}: <span style={{color:v>0?'#58a6ff':'#4d5566'}}>{v}/{m}</span></div>
      ))}
    </div>
  );
}

function StatCard({ label, value, sub, color, glow }) {
  return (
    <div className="card" style={glow?{borderColor:color,boxShadow:`0 0 12px ${color}33`}:{}}>
      <div className="stat-label">{label}</div>
      <div className="stat-val" style={{color:color||'#e6edf3'}}>{value??'—'}</div>
      {sub && <div className="stat-sub">{sub}</div>}
    </div>
  );
}

function PPSChart({ history, isAttack }) {
  const ref = useRef(null);
  const ch  = useRef(null);
  useEffect(()=>{
    if (!ref.current) return;
    if (ch.current) ch.current.destroy();
    const color = isAttack ? '#f85149' : '#58a6ff';
    ch.current = new Chart(ref.current, {
      type:'line',
      data:{
        labels: history.map((_,i)=>i),
        datasets:[{
          data: history,
          borderColor: color,
          backgroundColor: color+'22',
          borderWidth:2,
          fill:true,
          tension:0.4,
          pointRadius:0,
        }]
      },
      options:{
        responsive:true,animation:false,
        plugins:{legend:{display:false}},
        scales:{
          x:{display:false},
          y:{min:0,grid:{color:'#21262d'},ticks:{color:'#6e7681',font:{size:10}}}
        }
      }
    });
    return ()=>{if(ch.current)ch.current.destroy()};
  },[history,isAttack]);
  return <canvas ref={ref}/>;
}

function ProtoChart({ m }) {
  const ref = useRef(null);
  const ch  = useRef(null);
  useEffect(()=>{
    if (!ref.current||!m) return;
    if (ch.current) ch.current.destroy();
    const tcp  = (m.tcp_ratio||0)*100;
    const udp  = (m.udp_ratio||0)*100;
    const icmp = (m.icmp_ratio||0)*100;
    const other= Math.max(0,100-tcp-udp-icmp);
    ch.current = new Chart(ref.current,{
      type:'doughnut',
      data:{
        labels:['TCP','UDP','ICMP','Other'],
        datasets:[{
          data:[tcp,udp,icmp,other],
          backgroundColor:['#388bfd','#d4a72c','#f85149','#6e7681'],
          borderWidth:0,hoverOffset:4
        }]
      },
      options:{
        responsive:true,animation:false,
        cutout:'65%',
        plugins:{
          legend:{position:'right',labels:{color:'#8b949e',font:{size:11},padding:8,boxWidth:12}}
        }
      }
    });
    return ()=>{if(ch.current)ch.current.destroy()};
  },[m]);
  return <canvas ref={ref}/>;
}

function countryFlag(country) {
  if (!country || country === '?' || country === 'Private' || country === 'Unknown') return '🌐';
  if (country === 'CN') return '🇨🇳';
  if (country === 'RU') return '🇷🇺';
  if (country === 'US') return '🇺🇸';
  if (country === 'DE') return '🇩🇪';
  if (country === 'NL') return '🇳🇱';
  if (country === 'GB') return '🇬🇧';
  if (country === 'KR') return '🇰🇷';
  if (country === 'BR') return '🇧🇷';
  if (country === 'IN') return '🇮🇳';
  if (country === 'FR') return '🇫🇷';
  return '🌍';
}

function Dashboard() {
  const [status,   setStatus]   = useState(null);
  const [alerts,   setAlerts]   = useState([]);
  const [metrics,  setMetrics]  = useState(null);
  const [active,   setActive]   = useState({});
  const [forensics,setForensics]= useState(null);
  const [online,   setOnline]   = useState(false);
  const [ppsHist,  setPpsHist]  = useState(Array(60).fill(0));
  const [lastUpd,  setLastUpd]  = useState('—');

  useEffect(()=>{
    async function refresh() {
      const [s,a,m,lv,f] = await Promise.all([
        api('/status'), api('/alerts?limit=20'),
        api('/metrics'), api('/alerts/live'), api('/forensics')
      ]);
      if (s) { setStatus(s); setOnline(true); } else setOnline(false);
      if (a) setAlerts(a.alerts||[]);
      if (m) {
        setMetrics(m.live_traffic);
        const pps = m.live_traffic?.pps||0;
        setPpsHist(h=>[...h.slice(1),pps]);
      }
      if (lv) setActive(lv.attacks||{});
      if (f)  setForensics(f);
      setLastUpd(new Date().toLocaleTimeString());
    }
    refresh();
    const iv = setInterval(refresh,REFRESH);
    return ()=>clearInterval(iv);
  },[]);

  const hasAttack  = Object.keys(active).length > 0;
  const totalAlerts= status?.total_alerts??0;
  const uptime     = status ? `${Math.floor((status.uptime_seconds||0)/60)}m ${Math.round((status.uptime_seconds||0)%60)}s` : '—';
  const livePPS    = metrics ? Math.round(metrics.pps) : 0;
  const ppsColor   = livePPS > 200 ? '#f85149' : livePPS > 50 ? '#e3b341' : '#3fb950';

  return (
    <div>
      {/* Header */}
      <div className="header">
        <div className="logo">
          🛡️ DDoS MITIGATION TOOL — LIVE DASHBOARD
        </div>
        <div className="header-right">
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <div className={`status-dot ${online?'dot-online':'dot-offline'}`}/>
            <span style={{color:online?'#3fb950':'#f85149',fontWeight:600}}>
              {online?'CONNECTED':'DISCONNECTED'}
            </span>
          </div>
          <span>|</span>
          <span>Refreshes every 3s</span>
          <span>|</span>
          <span>API: {API_BASE}</span>
        </div>
      </div>

      {/* Attack Banner */}
      {hasAttack && (
        <div style={{background:'#1a0505',borderBottom:'2px solid #f85149',padding:'10px 28px',display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:20}}>🚨</span>
          <span style={{color:'#f85149',fontWeight:700,fontSize:14}}>
            ACTIVE ATTACK DETECTED — {Object.keys(active).length} source(s) under mitigation
          </span>
          <span style={{color:'#8b949e',fontSize:12,marginLeft:'auto'}}>
            {Object.entries(active).map(([ip,a])=>`${ip} → ${a.attack_type}`).join(' | ')}
          </span>
        </div>
      )}

      {/* Stat Cards */}
      <div className="grid-4">
        <StatCard label="Total Alerts" value={totalAlerts}
          sub="since startup" color={totalAlerts>0?'#f85149':'#3fb950'}
          glow={totalAlerts>0}/>
        <StatCard label="Active Attacks" value={Object.keys(active).length}
          sub={hasAttack?'⚠️ Under attack!':'✅ Clear'}
          color={hasAttack?'#f85149':'#3fb950'} glow={hasAttack}/>
        <StatCard label="Live PPS"
          value={livePPS}
          sub="packets per second" color={ppsColor}
          glow={livePPS>50}/>
        <StatCard label="Uptime" value={uptime}
          sub={`${status?.total_windows??0} windows analyzed`}
          color="#58a6ff"/>
      </div>

      {/* PPS Chart + Protocol */}
      <div className="grid-2" style={{padding:'16px 28px 0'}}>
        <div className="card">
          <div className="card-title">
            📈 Live Packet Rate (60s window)
            {hasAttack && <span style={{color:'#f85149',fontSize:10}}>● ATTACK IN PROGRESS</span>}
          </div>
          <PPSChart history={ppsHist} isAttack={hasAttack}/>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:8,fontSize:11,color:'#6e7681'}}>
            <span>60s ago</span>
            <span>Max: {fmt(Math.max(...ppsHist))} pps</span>
            <span>Now</span>
          </div>
        </div>
        <div className="card">
          <div className="card-title">🔀 Protocol Distribution</div>
          <ProtoChart m={metrics}/>
          <div style={{marginTop:12,display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
            {[
              ['SYN',metrics?.syn_ratio,'#f85149'],
              ['UDP',metrics?.udp_ratio,'#d4a72c'],
              ['ICMP',metrics?.icmp_ratio,'#f0883e'],
              ['TCP',metrics?.tcp_ratio,'#388bfd'],
            ].map(([k,v,c])=>(
              <div key={k} style={{display:'flex',alignItems:'center',gap:6,fontSize:11}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:c}}/>
                <span style={{color:'#8b949e'}}>{k}</span>
                <span style={{color:c,fontWeight:700,marginLeft:'auto'}}>
                  {v?`${(v*100).toFixed(1)}%`:'0.0%'}
                </span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Active Attacks + Metrics */}
      <div className="grid-equal" style={{padding:'16px 28px 0'}}>
        <div className={hasAttack?'card-attack':'card'}>
          <div className="card-title">
            {hasAttack?'🔴':'🟢'} Active Attacks
          </div>
          {!hasAttack ? (
            <div className="no-attack-msg">
              <div className="no-attack-icon">✅</div>
              <div className="no-attack-text">No Active Attacks</div>
              <div style={{fontSize:11,color:'#6e7681'}}>System monitoring normally</div>
            </div>
          ) : (
            Object.entries(active).map(([ip,atk])=>(
              <div key={ip} style={{marginBottom:12}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
                  <div className="active-ip">{ip}</div>
                  <div className="attack-chip">{atk.attack_type}</div>
                  <span className={`badge badge-${atk.threat_level||'LOW'}`}>
                    {atk.threat_level||'?'}
                  </span>
                </div>
                <div className="active-detail">
                  Score: <strong style={{color:scoreColor(atk.threat_score||0)}}>{atk.threat_score}/100</strong>
                  &nbsp;|&nbsp; L{atk.mitigation_level} {atk.mitigation_name}
                  &nbsp;|&nbsp; {countryFlag(atk.country)} {atk.country||'Private'}
                  {atk.isp && <span style={{color:'#4d5566'}}> · {atk.isp}</span>}
                </div>
                {atk.kernel_drops_pkts > 0 && (
                  <div className="active-drops">
                    ⚙️ Kernel drops: {fmt(atk.kernel_drops_pkts)} pkts · {fmt(atk.kernel_drops_bytes)} bytes
                  </div>
                )}
                <div style={{fontSize:11,color:'#4d5566',marginTop:4}}>
                  Since: {atk.started_at}
                </div>
                <ScoreBar score={atk.threat_score||0}/>
              </div>
            ))
          )}
        </div>

        <div className="card">
          <div className="card-title">📊 Live Traffic Metrics</div>
          {[
            ['PPS',          `${livePPS} pkt/s`,                    ppsColor],
            ['BPS',          `${fmt(metrics?.bps||0)} B/s`,         '#58a6ff'],
            ['SYN Ratio',    `${((metrics?.syn_ratio||0)*100).toFixed(1)}%`,  metrics?.syn_ratio>.3?'#f85149':'#3fb950'],
            ['UDP Ratio',    `${((metrics?.udp_ratio||0)*100).toFixed(1)}%`,  metrics?.udp_ratio>.5?'#d4a72c':'#3fb950'],
            ['ICMP Ratio',   `${((metrics?.icmp_ratio||0)*100).toFixed(1)}%`, metrics?.icmp_ratio>.5?'#f0883e':'#3fb950'],
            ['Unique IPs',   metrics?.unique_src_ips??0,            '#8b949e'],
            ['Total Dropped',`${fmt(metrics?.total_dropped_pkts||0)} pkts`, metrics?.total_dropped_pkts>0?'#f85149':'#3fb950'],
            ['Last Updated', metrics?.last_updated||'—',            '#4d5566'],
          ].map(([k,v,c])=>(
            <div key={k} className="metric-row">
              <span className="metric-label">{k}</span>
              <span className="metric-val" style={{color:c}}>{v}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Alerts Table */}
      <div className="pad">
        <div className="card">
          <div className="card-title">🚨 Recent Alerts</div>
          {alerts.length === 0 ? (
            <div className="empty">
              No alerts yet — system is actively monitoring
            </div>
          ) : (
            <div style={{overflowX:'auto'}}>
              <table className="alert-table">
                <thead>
                  <tr>
                    <th>Time</th>
                    <th>Source IP</th>
                    <th>Country</th>
                    <th>Attack</th>
                    <th>Level</th>
                    <th style={{minWidth:200}}>Score + Breakdown</th>
                    <th>PPS</th>
                    <th>ISP</th>
                    <th>Mitigation</th>
                    <th>Ack</th>
                  </tr>
                </thead>
                <tbody>
                  {alerts.map(a=>(
                    <tr key={a.id}>
                      <td style={{color:'#6e7681',whiteSpace:'nowrap'}}>
                        {a.timestamp?.split(' ')[1]||'—'}
                      </td>
                      <td><span className="ip-mono">{a.src_ip}</span></td>
                      <td>
                        <span title={a.country}>
                          {countryFlag(a.country)} {a.country||'?'}
                        </span>
                      </td>
                      <td><span className="attack-chip">{a.attack_type}</span></td>
                      <td><span className={`badge badge-${a.threat_level}`}>{a.threat_level}</span></td>
                      <td>
                        <ScoreBar score={a.threat_score}/>
                        <Breakdown bd={a.breakdown}/>
                      </td>
                      <td style={{color:'#58a6ff'}}>{Math.round(a.pps)}</td>
                      <td style={{color:'#6e7681',fontSize:11,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {a.isp||'—'}
                      </td>
                      <td>
                        <span style={{
                          color:a.mitigation?.level>=4?'#f85149':a.mitigation?.level>=2?'#e3b341':'#3fb950',
                          fontWeight:700,fontSize:11
                        }}>
                          L{a.mitigation?.level} {a.mitigation?.name}
                        </span>
                      </td>
                      <td>
                        {a.acknowledged
                          ? <span style={{color:'#3fb950'}}>✓</span>
                          : <span style={{color:'#4d5566'}}>○</span>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>

      {/* Forensics + API Status */}
      <div className="grid-equal" style={{padding:'16px 28px 0'}}>
        <div className="card">
          <div className="card-title">📁 Forensic Evidence</div>
          {forensics ? (
            <>
              {[
                ['📦 PCAP Files',   forensics.pcap_files?.length||0,   '#58a6ff'],
                ['📄 PDF Reports',  forensics.pdf_reports?.length||0,  '#3fb950'],
                ['📊 Timelines',    forensics.timelines?.length||0,    '#d4a72c'],
              ].map(([k,v,c])=>(
                <div key={k} className="metric-row">
                  <span className="metric-label">{k}</span>
                  <span style={{color:c,fontWeight:700}}>{v} files</span>
                </div>
              ))}
              <div style={{marginTop:12}}>
                {forensics.pdf_reports?.slice(0,2).map(f=>(
                  <div key={f.filename} style={{background:'#1c2128',borderRadius:6,padding:'6px 10px',marginBottom:6,fontSize:11}}>
                    <span style={{color:'#3fb950'}}>📄</span>
                    <span style={{color:'#8b949e',marginLeft:6}}>{f.filename}</span>
                    <span style={{color:'#4d5566',float:'right'}}>{f.size_kb}KB</span>
                  </div>
                ))}
              </div>
            </>
          ) : <div className="empty">No forensic files yet</div>}
        </div>

        <div className="card">
          <div className="card-title">🔗 System Status</div>
          {[
            ['ML Models',      'Loaded ✓',                           '#3fb950'],
            ['Isolation Forest','F1: 0.9485',                       '#58a6ff'],
            ['LSTM Network',   'F1: 0.9804',                        '#58a6ff'],
            ['RF Classifier',  'Acc: 100%',                         '#58a6ff'],
            ['Threat Intel',   'AbuseIPDB Active',                  '#3fb950'],
            ['REST API',       `http://192.168.56.2:${API_PORT}`,   '#8b949e'],
            ['API Docs',       `/docs`,                             '#8b949e'],
            ['WebSocket',      `/ws/events`,                        '#8b949e'],
          ].map(([k,v,c])=>(
            <div key={k} className="metric-row">
              <span className="metric-label">{k}</span>
              <span style={{color:c,fontSize:11}}>{v}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="footer pb">
        Last updated: {lastUpd} &nbsp;|&nbsp;
        DDoS Mitigation Tool v2.0 &nbsp;|&nbsp;

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard/>);
</script>
</body>
